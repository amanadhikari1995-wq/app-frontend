name: Build & Release Desktop Installer

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push of a version tag  →  full release (e.g. git push --tags)
#   • Manual "Run workflow"  →  test / hotfix release
#
# Secrets required (app-frontend → Settings → Secrets → Actions):
#   DEPLOY_TOKEN — GitHub PAT (classic) with "repo" scope.
#                  Needed to:
#                    • check out private app-backend repo
#                    • create/update a GitHub Release on watchdog-website
#                    • (electron-builder also reads it as GH_TOKEN)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      # ── 1. Check out both repos as siblings ─────────────────────────────
      #   Layout in runner workspace:
      #     frontend/   ← this repo
      #     backend/    ← app-backend
      #
      #   Required because:
      #     • backend.spec / cloud.spec reference  ../frontend/build/icon.ico
      #     • package.json extraResources reference ../backend/dist/...
      - name: Checkout app-frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout app-backend
        uses: actions/checkout@v4
        with:
          repository: amanadhikari1995-wq/app-backend
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: backend

      # ── 2. Python 3.11 + PyInstaller ────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build watchdog-backend.exe  (FastAPI server)
        working-directory: backend
        run: pyinstaller backend.spec --clean --noconfirm

      - name: Build watchdog-cloud.exe  (cloud relay)
        working-directory: backend
        run: pyinstaller cloud.spec --clean --noconfirm

      # ── 3. Node.js + Next.js (Electron build — no BASE_PATH / relay) ────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export  (Electron mode)
        working-directory: frontend
        run: npx next build

      # ── 4. electron-builder → Windows NSIS installer ────────────────────
      #   GH_TOKEN lets electron-builder publish directly to GitHub Releases
      #   (publish config in package.json → watchdog-website repo).
      - name: Build Windows installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: npm run dist:win

      # ── 5. Determine version string ──────────────────────────────────────
      - name: Get version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(node -p "require('./frontend/package.json').version")
            echo "version=v${VER}-manual" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Upload artifact to workflow run (always available) ────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatchDog-Windows-Installer-${{ steps.ver.outputs.version }}
          path: frontend/dist-electron/*.exe
          retention-days: 30

      # ── 7. Publish GitHub Release on watchdog-website ────────────────────
      #   routes/downloads.js reads the latest release from this repo,
      #   so the download link at watchdogbot.cloud/downloads/app updates
      #   automatically as soon as this release is published.
      - name: Publish release → watchdog-website
        uses: softprops/action-gh-release@v2
        with:
          repository: amanadhikari1995-wq/watchdog-website
          tag_name: ${{ steps.ver.outputs.version }}
          name: "WatchDog ${{ steps.ver.outputs.version }}"
          draft: false
          prerelease: false
          files: frontend/dist-electron/*.exe
          token: ${{ secrets.DEPLOY_TOKEN }}
          body: |
            ## WatchDog ${{ steps.ver.outputs.version }}

            **Download the installer below** and run it on your Windows PC.

            The installer includes:
            - WatchDog desktop app (Electron)
            - Watchdog Backend  (FastAPI — runs locally)
            - Watchdog Cloud Relay  (connects desktop to the web dashboard)

            ---
            Built from commit: `${{ github.sha }}`
            Triggered by: `${{ github.actor }}`
